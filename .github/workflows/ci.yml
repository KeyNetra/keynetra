name: 🚀 CI Pipeline

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHONUNBUFFERED: "1"
  PIP_DISABLE_PIP_VERSION_CHECK: "1"
  PIP_NO_PYTHON_VERSION_WARNING: "1"
  FORCE_COLOR: "1"

  KEYNETRA_DATABASE_URL: sqlite+pysqlite:///./.keynetra-ci.db
  KEYNETRA_API_KEYS: testkey
  KEYNETRA_RATE_LIMIT_PER_MINUTE: "5000"
  KEYNETRA_RATE_LIMIT_BURST: "5000"

jobs:

# =====================================================
# 🔐 STAGE 1 — SECRET SCAN
# =====================================================
  secret-scan:
    name: 🔐 Stage 1 / Secret Scan
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: 📥 Checkout Source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 📢 Stage Start
        run: |
          echo "🔐 Starting secret scan..."
          echo "Repository: ${{ github.repository }}"
          echo "Branch: ${{ github.ref_name }}"

      - name: 🔍 Run Gitleaks
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/repo" \
            ghcr.io/gitleaks/gitleaks:latest \
            detect \
            --source /repo \
            --verbose \
            --redact \
            --exit-code 1

      - name: ✅ Stage Complete
        run: echo "✅ Secret scan passed."

# =====================================================
# 🧹 STAGE 2 — LINT
# =====================================================
  lint:
    name: 🧹 Stage 2 / Lint & Static Checks
    runs-on: ubuntu-latest
    needs: secret-scan
    timeout-minutes: 15

    steps:
      - name: 📥 Checkout Source
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: 📦 Install Dependencies
        run: |
          echo "📦 Installing dependencies..."
          python -m pip install --upgrade pip wheel setuptools
          pip install -r requirements.lock
          pip install -r requirements-dev.lock

      - name: 🔎 Run Quality Checks
        run: |
          echo "🧹 Running Ruff..."
          ruff check .

          echo "🎨 Running Black..."
          black --check .

          echo "📚 Running isort..."
          isort --check-only .

          echo "🧠 Running mypy..."
          mypy keynetra

          echo "🧠 Running Import Linter..."
          lint-imports --config .importlinter

      - name: ✅ Stage Complete
        run: echo "✅ Lint stage passed."

# =====================================================
# 🛡 STAGE 3 — SECURITY
# =====================================================
  security-deps:
    name: 🛡 Stage 3 / Security
    runs-on: ubuntu-latest
    needs: lint
    timeout-minutes: 20

    steps:
      - name: 📥 Checkout Source
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: 📦 Install Tools
        run: |
          echo "📦 Installing audit tools..."
          python -m pip install --upgrade pip
          pip install -r requirements.lock
          pip install -r requirements-dev.lock
          pip install pip-audit bandit detect-secrets

      - name: 🔍 Run Security Audit
        run: |
          mkdir -p artifacts
          echo "🛡 Scanning dependencies..."
          pip-audit -r requirements.lock -r requirements-dev.lock
          pip-audit -f cyclonedx-json -o artifacts/sbom.cdx.json
          echo "🛡 Scanning source with Bandit..."
          bandit -r keynetra
          echo "🛡 Checking committed secrets against baseline..."
          git ls-files -z | xargs -0 detect-secrets-hook --baseline .secrets.baseline

      - name: 📤 Upload SBOM
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: artifacts/sbom.cdx.json

      - name: ✅ Stage Complete
        run: echo "✅ Dependency security stage passed."

# =====================================================
# 📦 STAGE 4 — OPENAPI CONTRACTS
# =====================================================
  sdk-contracts:
    name: 📦 Stage 4 / Public Contract Verification
    runs-on: ubuntu-latest
    needs: security-deps
    timeout-minutes: 20

    steps:
      - name: 📥 Checkout Source
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: 📦 Install App
        run: |
          echo "📦 Installing project..."
          python -m pip install --upgrade pip
          pip install -r requirements.lock
          pip install -r requirements-dev.lock
          pip install -e .

      - name: 🧾 Export Contracts
        run: |
          echo "📄 Generating OpenAPI contracts..."
          mkdir -p contracts
          keynetra generate-openapi \
            --output contracts/openapi.json \
            --yaml-output contracts/openapi.yaml

      - name: 🔒 Drift Check
        run: |
          echo "🔒 Checking contract drift..."
          git diff --exit-code -- contracts/openapi.json contracts/openapi.yaml

      - name: ✅ Validate Contracts
        run: |
          echo "🧪 Validating OpenAPI..."
          keynetra check-openapi --contract contracts/openapi.json
          keynetra check-openapi --contract contracts/openapi.yaml

      - name: 📤 Upload Contracts
        uses: actions/upload-artifact@v4
        with:
          name: sdk-contracts
          path: |
            contracts/openapi.json
            contracts/openapi.yaml

      - name: ✅ Stage Complete
        run: echo "✅ Contract verification passed."

# =====================================================
# 🧪 STAGE 5 — TEST MATRIX
# =====================================================
  test:
    name: 🧪 Stage 5 / Test (${{ matrix.python-version }})
    runs-on: ubuntu-latest
    needs:
      - security-deps
      - sdk-contracts

    strategy:
      fail-fast: true
      matrix:
        python-version: ["3.11", "3.12", "3.13", "3.14"]

    steps:
      - name: 📥 Checkout Source
        uses: actions/checkout@v4

      - name: 🐍 Setup Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: 📦 Install Dependencies
        run: |
          echo "📦 Installing on Python ${{ matrix.python-version }}"
          python -m pip install --upgrade pip
          pip install -r requirements.lock
          pip install -r requirements-dev.lock
          pip install -e .

      - name: 🔄 Contract Check
        run: |
          echo "🔄 Verifying OpenAPI contract..."
          keynetra check-openapi

      - name: 🗄 Migration Test
        run: |
          echo "🗄 Running migrations..."
          keynetra migrate --confirm-destructive

      - name: 🧪 Run Tests
        run: |
          echo "🧪 Running pytest..."
          STRICT_MODULE_COVERAGE=1 pytest --cov-fail-under=90

          if [ -d ./keynetra-client-python/tests ]; then
            echo "📦 Running SDK tests..."
            pytest -q keynetra-client-python/tests
          fi

          python scripts/check_coverage.py

      - name: 🧪 Integration Smoke
        if: matrix.python-version == '3.11'
        run: |
          echo "🧪 Running integration-focused smoke selection..."
          pytest --no-cov tests/test_api.py tests/test_admin_audit.py tests/test_api_contract.py

      - name: 📦 Build Artifact Verify
        if: matrix.python-version == '3.11'
        run: |
          echo "📦 Building distribution..."
          python -m build

      - name: 🐳 Docker Build Smoke
        if: matrix.python-version == '3.11'
        run: |
          echo "🐳 Building Docker image..."
          docker build -t keynetra:ci .

      - name: ⛵ Helm Template
        if: matrix.python-version == '3.11'
        run: |
          echo "⛵ Installing Helm..."
          curl -fsSL https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash
          echo "⛵ Rendering chart..."
          helm lint deploy/helm/keynetra
          helm template keynetra deploy/helm/keynetra >/tmp/keynetra-helm.yaml

      - name: 🔄 Migration Roundtrip
        if: matrix.python-version == '3.11'
        run: |
          echo "🔄 Verifying migration roundtrip..."
          pytest --no-cov tests/test_migration_utils.py::test_migration_roundtrip_creates_and_drops_schema

      - name: ✅ Matrix Complete
        run: echo "✅ Python ${{ matrix.python-version }} passed."

# =====================================================
# 🚦 STAGE 6 — LOAD TEST
# =====================================================
  load-test:
    name: 🚦 Stage 6 / Load Smoke Test
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: 📥 Checkout Source
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: 📦 Install Tools
        run: |
          echo "📦 Installing locust..."
          pip install -r requirements.lock
          pip install locust uvicorn

      - name: 🚀 Start API
        run: |
          echo "🚀 Booting API..."
          python -m uvicorn keynetra.api.main:app \
            --host 127.0.0.1 \
            --port 8000 &
          sleep 5

      - name: ❤️ Health Check
        run: |
          echo "❤️ Checking health..."
          curl --fail http://127.0.0.1:8000/health || curl --fail http://127.0.0.1:8000/docs

      - name: ⚡ Run Locust
        run: |
          echo "⚡ Running load test..."
          locust \
            -f locustfile.py \
            --host http://127.0.0.1:8000 \
            --headless \
            -u 10 \
            -r 2 \
            -t 20s \
            --csv /tmp/locust \
            --only-summary

      - name: 📊 Validate Load Budget
        run: |
          echo "📊 Validating latency / throughput..."
          python scripts/check_load_budget.py

      - name: ✅ Stage Complete
        run: echo "✅ Load test passed."

# =====================================================
# 🏁 FINAL SUMMARY
# =====================================================
  ci-status:
    name: 🏁 Final CI Status
    runs-on: ubuntu-latest
    if: always()
    needs:
      - secret-scan
      - lint
      - security-deps
      - sdk-contracts
      - test
      - load-test

    steps:
      - name: 📋 Final Summary
        run: |
          echo "🚀 CI PIPELINE FINISHED" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Stage | Result |" >> $GITHUB_STEP_SUMMARY
          echo "|------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| 🔐 Secret Scan | ${{ needs.secret-scan.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 🧹 Lint | ${{ needs.lint.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 🛡 Security | ${{ needs.security-deps.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 📦 Contracts | ${{ needs.sdk-contracts.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 🧪 Tests | ${{ needs.test.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 🚦 Load Test | ${{ needs.load-test.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "🔥 Ready for merge if all green." >> $GITHUB_STEP_SUMMARY
