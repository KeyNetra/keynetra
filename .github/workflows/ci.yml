name: CI Pipeline

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

env:
  PYTHONUNBUFFERED: "1"
  KEYNETRA_DATABASE_URL: sqlite+pysqlite:///./.keynetra-ci.db
  KEYNETRA_API_KEYS: testkey
  KEYNETRA_RATE_LIMIT_PER_MINUTE: "5000"
  KEYNETRA_RATE_LIMIT_BURST: "5000"

jobs:

  # -------------------------------
  # Stage 1: Security Scan
  # -------------------------------
  secret-scan:
    name: 🔐 Secret Scan (Gitleaks)
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🔍 Run Gitleaks
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/repo \
            ghcr.io/gitleaks/gitleaks:latest \
            detect --source /repo --verbose --exit-code 1


  # -------------------------------
  # Stage 2: Lint & Static Checks
  # -------------------------------
  lint:
    name: 🧹 Lint & Formatting
    runs-on: ubuntu-latest
    needs: secret-scan

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: 📦 Install dependencies
        run: |
          pip install -r requirements.lock
          pip install -r requirements-dev.lock

      - name: 🧪 Run linters
        run: |
          ruff check .
          black --check .
          isort --check-only .
          lint-imports --config .importlinter


  # -------------------------------
  # Stage 3: Security Dependencies
  # -------------------------------
  security-deps:
    name: 🛡 Dependency Security Scan
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: 📦 Install dependencies
        run: |
          pip install -r requirements.lock
          pip install pip-audit

      - name: 🔍 Run pip-audit
        run: |
          pip-audit
          mkdir -p artifacts
          pip-audit -f cyclonedx-json -o artifacts/sbom.cdx.json

      - name: 📤 Upload SBOM
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: artifacts/sbom.cdx.json


  # -------------------------------
  # Stage 4: Tests (Matrix)
  # -------------------------------
  test:
    name: CI / test (${{ matrix.python-version }})
    runs-on: ubuntu-latest
    needs: security-deps

    strategy:
      fail-fast: true
      matrix:
        python-version: ["3.11", "3.12", "3.13", "3.14"]

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: 📦 Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.lock
          pip install -r requirements-dev.lock
          pip install -e .

          if [ -d ./keynetra-client-python ]; then
            pip install -e ./keynetra-client-python
          fi

      - name: 🔄 OpenAPI drift check
        run: keynetra check-openapi

      - name: 🗄 Migration check
        run: keynetra migrate --confirm-destructive

      - name: 🧪 Run tests with coverage
        run: |
          pytest -q \
            --cov=keynetra \
            --cov-fail-under=80 \
            --cov-report=term \
            --cov-report=json

          if [ -d ./keynetra-client-python/tests ]; then
            pytest -q keynetra-client-python/tests
          fi

          python scripts/check_coverage.py


  # -------------------------------
  # Stage 5: Load Test
  # -------------------------------
  load-test:
    name: 🚦 Load Smoke Test
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: 📦 Install dependencies
        run: |
          pip install -r requirements.lock
          pip install locust uvicorn

      - name: 🚀 Start API
        run: |
          python -m uvicorn keynetra.api.main:app --host 127.0.0.1 --port 8000 &
          sleep 3

      - name: ⚡ Run Locust
        run: |
          locust \
            -f locustfile.py \
            --host http://127.0.0.1:8000 \
            --headless \
            -u 10 \
            -r 2 \
            -t 20s \
            --csv /tmp/locust \
            --only-summary

      - name: 📊 Validate load budget
        run: python scripts/check_load_budget.py
