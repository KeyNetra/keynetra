policies:
  - allow:
      action: approve_payment
      priority: 10
      policy_key: approve-manager-owner
      when:
        role: manager
        max_amount: 100000
        owner_only: true
  - deny:
      action: approve_payment
      priority: 20
      policy_key: reject-non-owner
      when:
        role: manager

tests:
  - name: manager_can_approve_small_payment
    input:
      user:
        id: 1
        role: manager
      action: approve_payment
      resource:
        amount: 500
        owner_id: 1
    expect: allow
  - name: non_owner_is_denied_even_if_manager
    input:
      user:
        id: 1
        role: manager
      action: approve_payment
      resource:
        amount: 500
        owner_id: 99
    expect: deny
